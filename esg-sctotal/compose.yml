version: '3.8'

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
  kafka_data:
  mariadb_data:
    external: true
    name: data-mariadb

  pgvector_data:
    external: true
    name: 4281a04050faab534d459dc1114819260e8493c8b497d59779900402aa106389

services:
  # 1. Redis 설정
  redis:
    container_name: redis
    image: redis:8.4.0
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: always

  # 2. Kafka 설정 (KRaft 모드)
  # 내부 서비스(FastAPI 등)는 local-kafka:9092로, 호스트 PC는 localhost:9094로 접속하도록 리스너 분리
  # kafka:
  #   container_name: kafka
  #   image: apache/kafka:4.0.1
  #   ports:
  #     - "9092:9092" # 👈 로컬(내 PC) 백엔드가 접근할 포트
  #     - "9094:9094" # 👈 FastAPI가 호스트 PC로 접속할 포트
  #   working_dir: /opt/kafka/bin/
  #   environment:
  #     KAFKA_NODE_ID: 1
  #     KAFKA_PROCESS_ROLES: broker,controller
  #     KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
  #     KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9095
  #     KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
  #     KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  #     KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
  #     KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
  #     KAFKA_LOG_DIRS: /var/lib/kafka/data
  #     CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
  #   volumes:
  #     - kafka_data:/var/lib/kafka/data
  #   networks:
  #     - app-network
  #   restart: always
  kafka:
    container_name: kafka
    image: apache/kafka:4.0.1
    ports:
      - "9092:9092" # 👈 로컬(내 PC) 백엔드가 접근할 포트
      - "9094:9094" # 👈 FastAPI가 호스트 PC를 통해 접속할 포트
    working_dir: /opt/kafka/bin/
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # 컨트롤러 포트를 9093으로 일치시켰습니다.
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:19093

      # 카프카가 내부적으로 리스닝할 포트들을 모두 정의합니다. (9092, 9094 추가)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,LOCAL_BACKEND://0.0.0.0:9092,FASTAPI://0.0.0.0:9094,CONTROLLER://0.0.0.0:19093

      # 클라이언트가 카프카에 접속할 때 받아갈 "실제 주소" 안내판입니다.
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,LOCAL_BACKEND://localhost:9092,FASTAPI://localhost:9094

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # 새로 정의한 리스너 이름들의 보안 프로토콜을 매핑합니다.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,LOCAL_BACKEND:PLAINTEXT,FASTAPI:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - app-network
    restart: always

  # 3. MariaDB 설정
  mariadb:
    image: mariadb:12.1.2
    container_name: local-mariadb
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: mydatabase
      MARIADB_USER: myuser
      MARIADB_PASSWORD: mypassword
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - app-network
    restart: always

  # 4. PostgreSQL + pgvector 설정
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: local-pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vectordb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: always
